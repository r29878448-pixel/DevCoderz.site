<!DOCTYPE html>
<html lang="hi" style="user-select: none;">
<head>
  <style>
    /* Fixed Footer Layout */
    .controls-wrapper { 
      position: absolute; bottom: 0; width: 100%; 
      padding: 20px 20px 30px 20px; /* Neeche space badhayi */
      background: linear-gradient(transparent, rgba(0,0,0,0.8)); 
      z-index: 20; transition: opacity 0.3s; 
    }

    /* Progress Bar Fix */
    .time-row { display: flex; align-items: center; gap: 10px; font-size: 11px; margin-bottom: 15px; }
    .progress-bar { 
      flex: 1; height: 6px; background: rgba(255,255,255,0.2); 
      cursor: pointer; position: relative; border-radius: 3px; 
    }
    .progress-played { 
      height: 100%; background: var(--accent); width: 0%; 
      border-radius: 3px; position: relative; 
    }
    /* White dot (thumb) Fix */
    .thumb { 
      position: absolute; right: -6px; top: -3px; 
      width: 12px; height: 12px; background: #fff; 
      border-radius: 50%; box-shadow: 0 0 4px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <div class="controls-wrapper" id="ctrls">
    <div class="time-row">
      <span id="cur">00:00:00</span>
      <div id="progressBar" class="progress-bar">
        <div id="progressPlayed" class="progress-played">
          <div class="thumb"></div>
        </div>
      </div>
      <span id="dur">00:00:00</span>
    </div>
    </div>
</body>
</html>
