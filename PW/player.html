<!DOCTYPE html>
<html lang="hi" style="user-select: none;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DevCoderZ Player</title>
  <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.11/dist/shaka-player.compiled.min.js"></script>
  <style>
    :root { --accent: #0ea5e9; }
    body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
    #player-container { width: 100vw; height: 100dvh; position: relative; display: flex; flex-direction: column; transition: transform 0.3s; }
    video { width: 100%; height: 100%; object-fit: contain; }
    .branding { position: absolute; top: 15px; left: 15px; z-index: 100; pointer-events: none; }
    .b1 { font-size: 10px; font-weight: 800; color: var(--accent); }
    .controls-wrapper { position: absolute; bottom: 0; width: 100%; padding: 15px; background: linear-gradient(transparent, #000); z-index: 100; transition: opacity 0.3s; }
    .hidden { opacity: 0; pointer-events: none; }
    .time-row { display: flex; align-items: center; gap: 10px; font-size: 11px; margin-bottom: 15px; font-family: monospace; }
    .progress-bar { flex: 1; height: 16px; display: flex; align-items: center; cursor: pointer; position: relative; }
    .progress-track { width: 100%; height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; position: relative; }
    .progress-played { height: 6px; background: var(--accent); width: 0%; border-radius: 3px; position: absolute; top: 5px; }
    .thumb { position: absolute; right: -6px; top: -3px; width: 12px; height: 12px; background: #fff; border-radius: 50%; }
    .btn-row { display: flex; gap: 20px; align-items: center; justify-content: center; }
    .btn { cursor: pointer; font-size: 18px; color: white; min-width: 40px; text-align: center; }
    #play::before { content: "▶"; }
    #play.playing::before { content: "❚❚"; }
    
    /* Eduvibe Style Settings */
    .menu { position: absolute; bottom: 70px; right: 10px; background: #1a1a1a; padding: 15px; border-radius: 8px; display: none; border: 1px solid #333; width: 180px; z-index: 150; }
    .menu-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 13px; }
    .menu select { background: #000; color: #fff; border: 1px solid #444; border-radius: 4px; padding: 2px 5px; }
    
    .landscape-mode { position: fixed; top: 0; left: 0; width: 100dvh; height: 100vw; transform-origin: top left; transform: rotate(90deg) translate(0, -100%); }
  </style>
</head>
<body>
<div id="player-container">
  <video id="video" playsinline></video>
  <div class="controls-wrapper" id="ctrls">
    <div class="time-row">
      <span id="cur">00:00:00</span>
      <div id="progressBar" class="progress-bar">
        <div class="progress-track"><div id="progressPlayed" class="progress-played"><div class="thumb"></div></div></div>
      </div>
      <span id="dur">00:00:00</span>
    </div>
    <div class="btn-row">
      <div class="btn" onclick="seek(-10)">⟲10</div>
      <div class="btn" id="play" onclick="togglePlay()"></div>
      <div class="btn" onclick="seek(10)">10⟳</div>
      <div class="btn" onclick="toggleFS()">⛶</div>
      <div class="btn" onclick="goToDownload()">⬇️</div>
      <div class="btn" onclick="toggleMenu()">⚙️</div>
    </div>
  </div>
  
  <div class="menu" id="setMenu">
    <div class="menu-item">
      <span>Quality</span>
      <select id="qualityList" onchange="changeQuality(this.value)"><option value="auto">Auto</option></select>
    </div>
    <div class="menu-item">
      <span>Speed</span>
      <select onchange="video.playbackRate = this.value">
        <option value="0.5">0.5x</option><option value="1" selected>1x</option><option value="1.5">1.5x</option><option value="2">2x</option>
      </select>
    </div>
  </div>
</div>

<script>
  const video = document.getElementById('video'), ctrls = document.getElementById('ctrls'), menu = document.getElementById('setMenu'), playBtn = document.getElementById('play'), progressBar = document.getElementById('progressBar'), container = document.getElementById('player-container');
  
  function togglePlay() { video.paused ? video.play() : video.pause(); }
  video.addEventListener('play', () => playBtn.classList.add('playing'));
  video.addEventListener('pause', () => playBtn.classList.remove('playing'));
  
  async function toggleFS() {
    if (!document.fullscreenElement) {
      await document.documentElement.requestFullscreen();
      container.classList.add('landscape-mode');
    } else {
      await document.exitFullscreen();
      container.classList.remove('landscape-mode');
    }
  }
  
  function toggleMenu() { menu.style.display = menu.style.display === 'block' ? 'none' : 'block'; }
  function seek(s) { video.currentTime += s; }
  function goToDownload() { window.location.href = `download.html?url=${encodeURIComponent(video.currentSrc || window.location.href)}`; }
  
  
  document.getElementById('player-container').onclick = (e) => {
    if(!e.target.closest('.controls-wrapper') && !e.target.closest('.menu')) {
        menu.style.display = 'none';
        ctrls.classList.toggle('hidden');
    }
  };

  video.ontimeupdate = () => {
    const pct = (video.currentTime / video.duration) * 100;
    document.getElementById('progressPlayed').style.width = pct + '%';
    document.getElementById('cur').innerText = new Date(video.currentTime * 1000).toISOString().substr(11, 8);
    document.getElementById('dur').innerText = new Date((video.duration || 0) * 1000).toISOString().substr(11, 8);
  };

  progressBar.onpointerdown = (e) => {
    const rect = progressBar.getBoundingClientRect();
    video.currentTime = ((e.clientX - rect.left) / rect.width) * video.duration;
  };
</script>
<script src="/PW/player.js"></script>
</body>
</html>
