<!DOCTYPE html>
<html lang="hi" style="user-select: none;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Devansh Player</title>
  <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.11/dist/shaka-player.compiled.min.js"></script>
  <style>
    :root { --accent: #0ea5e9; --glass: rgba(255,255,255,0.15); }
    body { margin: 0; background: #000; font-family: sans-serif; color: white; }
    
    .player-container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
    video { width: 100%; height: 100%; }

    .powered-by {
      position: absolute; top: 20px; right: 20px; z-index: 99;
      background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(8px);
      padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 600;
      border: 1px solid rgba(255, 255, 255, 0.2); pointer-events: none;
    }

    .controls-bar {
      position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.6);
      padding: 20px; display: flex; flex-direction: column; gap: 10px;
    }

    #progressBar { width: 100%; height: 6px; background: #334155; border-radius: 4px; cursor: pointer; }
    #progressPlayed { height: 100%; width: 0%; background: var(--accent); border-radius: 4px; }
    
    .btn-group { display: flex; gap: 15px; }
    button { background: var(--accent); border: none; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>

  <div class="player-container">
    <video id="video" playsinline></video>
    <div class="powered-by">Powered by Devansh Sharma</div>
    
    <div class="controls-bar">
      <div id="progressBar"><div id="progressPlayed"></div></div>
      <div class="btn-group">
        <button id="playBtn">Play/Pause</button>
        <button id="fullScreenBtn">Fullscreen</button>
      </div>
    </div>
  </div>

  <script>
    const video = document.getElementById('video');
    const playBtn = document.getElementById('playBtn');
    const progressPlayed = document.getElementById('progressPlayed');

    async function initPlayer() {
        const player = new shaka.Player(video);
        const params = new URLSearchParams(window.location.search);
        
        try {
            // Yahan wahi original API logic hai
            const manifestUrl = await getStreamUrl(params); 
            await player.load(manifestUrl);
        } catch (e) { console.error("Error loading stream", e); }
    }

    playBtn.onclick = () => video.paused ? video.play() : video.pause();
    video.ontimeupdate = () => {
        progressPlayed.style.width = (video.currentTime / video.duration) * 100 + "%";
    };

    document.getElementById('fullScreenBtn').onclick = () => video.requestFullscreen();

    // Original Player.js logic wahi rahega jo pehle tha
    initPlayer();
  </script>
  <script src="/PW/player.js"></script>
</body>
</html>
