<!DOCTYPE html>
<html lang="hi" style="user-select: none;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DevCoderZ Player</title>
  <style>
    :root { --accent: #0ea5e9; }
    body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
    
    #player-container { 
      width: 100vw; height: 100dvh; 
      position: relative; display: flex; 
      flex-direction: column; transition: transform 0.3s; 
    }
    
    video { width: 100%; height: 100%; object-fit: contain; }

    .controls-wrapper { 
      position: absolute; bottom: 0; width: 100%; 
      padding: 15px; background: linear-gradient(transparent, #000); 
      z-index: 100; transition: opacity 0.3s; 
    }
    .hidden { opacity: 0; pointer-events: none; }

    .time-row { display: flex; align-items: center; gap: 10px; font-size: 11px; margin-bottom: 10px; }
    .progress-bar { flex: 1; height: 10px; background: rgba(255,255,255,0.2); cursor: pointer; position: relative; }
    .progress-played { height: 100%; background: var(--accent); width: 0%; }

    .btn-row { display: flex; gap: 15px; align-items: center; justify-content: center; }
    .btn { cursor: pointer; font-size: 20px; color: white; padding: 10px; }

    /* Landscape Fix */
    .landscape-mode {
      position: fixed; top: 0; left: 0; 
      width: 100dvh; height: 100vw;
      transform-origin: top left; 
      transform: rotate(90deg) translate(0, -100%);
    }
  </style>
</head>
<body>
<div id="player-container">
  <video id="video" playsinline></video>
  
  <div class="controls-wrapper" id="ctrls">
    <div class="time-row">
      <span id="cur">00:00:00</span>
      <div id="progressBar" class="progress-bar"><div id="progressPlayed" class="progress-played"></div></div>
      <span id="dur">00:00:00</span>
    </div>
    <div class="btn-row">
      <div class="btn" onclick="seek(-10)">⟲</div>
      <div class="btn" id="play" onclick="togglePlay()">▶</div>
      <div class="btn" onclick="seek(10)">⟳</div>
      <div class="btn" onclick="toggleFS()">⛶</div>
    </div>
  </div>
</div>

<script>
  const video = document.getElementById('video'), ctrls = document.getElementById('ctrls'), container = document.getElementById('player-container');
  
  function togglePlay() { video.paused ? video.play() : video.pause(); }
  function seek(s) { video.currentTime += s; }
  
  async function toggleFS() {
    if (!document.fullscreenElement) {
      await document.documentElement.requestFullscreen();
      container.classList.add('landscape-mode');
    } else {
      await document.exitFullscreen();
      container.classList.remove('landscape-mode');
    }
  }

  video.addEventListener('play', () => document.getElementById('play').innerText = "❚❚");
  video.addEventListener('pause', () => document.getElementById('play').innerText = "▶");
  
  video.ontimeupdate = () => {
    document.getElementById('progressPlayed').style.width = (video.currentTime / video.duration) * 100 + '%';
  };
</script>
</body>
</html>
