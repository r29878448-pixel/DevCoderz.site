<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevCoderZ Player</title>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.11/dist/shaka-player.compiled.min.js"></script>
    <style>
        body, html { margin:0; padding:0; background:#1a1a1a; color:#fff; height:100%; font-family: sans-serif; }
        #player-ui { position:relative; width:100%; height:100%; display:flex; flex-direction:column; }
        
        
        #loader { position:absolute; inset:0; z-index:999; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.8); }
        .spinner { width:60px; height:60px; border:6px solid #444; border-top:6px solid #6366f1; border-radius:50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        
        .controls { padding:20px; background:#000; display:flex; flex-direction:column; gap:15px; }
        .progress-container { width:100%; height:6px; background:#333; cursor:pointer; border-radius:3px; }
        .progress-bar { height:100%; width:0%; background:#6366f1; border-radius:3px; position:relative; }
        .icon-row { display:flex; justify-content:space-between; align-items:center; font-size:24px; }
        .branding { position:absolute; top:20px; left:20px; color:#6366f1; font-weight:bold; font-size:18px; }
    </style>
</head>
<body>

<div id="player-ui">
    <div class="branding">THE DEVCODERZ</div>
    
    <div id="loader">
        <div class="spinner"></div>
        <p>Loading video... 75%</p>
    </div>

    <video id="v" style="flex-grow:1; background:#000;"></video>

    <div class="controls">
        <div class="progress-container" id="seek-bar"><div class="progress-bar" id="played"></div></div>
        <div class="icon-row">
            <span>0:00 / 0:00</span>
            <div style="display:flex; gap:20px;">
                <span onclick="seek(-10)">↺10</span>
                <span id="play-pause">▶</span>
                <span onclick="seek(10)">10↻</span>
                <span>🔊</span>
                <span>☰</span>
                <span>⚙️</span>
                <span onclick="window.location.href='download.html'">⬇</span>
                <span onclick="alert('Attachments')">📎</span>
            </div>
        </div>
    </div>
</div>

<script src="/PW/player.js"></script>
<script>
    const v = document.getElementById('v'), played = document.getElementById('played');
    const player = new shaka.Player(v);

   
    document.body.onclick = () => {
        document.getElementById('loader').style.display = 'none';
        v.play();
    };

   v.ontimeupdate = () => {
        played.style.width = (v.currentTime / v.duration) * 100 + "%";
    };

    function seek(s) { v.currentTime += s; }
    
    document.getElementById('play-pause').onclick = (e) => {
        e.stopPropagation();
        v.paused ? v.play() : v.pause();
    };
</script>
</body>
</html>
