<!DOCTYPE html>
<html lang="hi" style="user-select: none;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mtaiirus Player</title>
  <style>
    :root {
      --bg: #000;
      --accent: #0ea5e9;
      --accentl: #7dd3fc;
      --text: #fff;
    }
    /* Fixed Branding Size */
    .recorded-badge { 
      position: absolute; z-index: 23; top: 18px; left: 18px; 
      padding: 4px 8px; border-radius: 6px; 
      border: 1px solid rgba(14,165,233,.3); 
      background: rgba(0,0,0,.5); color: var(--accentl); 
      font-size: 9px; font-weight: 600; text-transform: uppercase;
    }
    /* Baaki Original CSS Structure */
    body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
    .player { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
    video { width: 100%; height: 100%; object-fit: contain; }
    .footer { position: absolute; bottom: 20px; width: 100%; padding: 0 20px; }
    .progress-bar { width: 100%; height: 6px; background: #333; cursor: pointer; position: relative; border-radius: 3px; }
    .progress-played { height: 100%; background: var(--accent); width: 0%; border-radius: 3px; }
    .progress-thumb { position: absolute; top: -3px; width: 12px; height: 12px; background: var(--accentl); border-radius: 50%; pointer-events: none; }
    .controls { display: flex; gap: 15px; margin-top: 15px; align-items: center; }
    button { background: rgba(255,255,255,0.1); border: 1px solid #444; color: #fff; padding: 8px 12px; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>

<div class="player" id="rootPlayer">
  <video id="video" playsinline></video>
  <div class="recorded-badge">DEVELOPED BY DEVANSH SHARMA</div>

  <div class="footer">
    <div id="progressBar" class="progress-bar">
      <div id="progressPlayed" class="progress-played"></div>
      <div id="progressThumb" class="progress-thumb"></div>
    </div>
    
    <div class="controls">
      <button id="playBtn">Play/Pause</button>
      <button id="fullscreenBtn">Fullscreen</button>
      <button id="downloadBtn">Download</button>
      <button id="attachmentsBtn">Attachments</button>
      <button id="settingsBtn">Settings</button>
    </div>
  </div>
</div>

<script>
  const video = document.getElementById('video');
  const progressBar = document.getElementById('progressBar');
  const progressPlayed = document.getElementById('progressPlayed');
  const progressThumb = document.getElementById('progressThumb');
  const fullscreenBtn = document.getElementById('fullscreenBtn');
  const rootPlayer = document.getElementById('rootPlayer');

  // Ultra Smooth Drag
  function updateSeek(e) {
    const rect = progressBar.getBoundingClientRect();
    let pos = (e.clientX - rect.left) / rect.width;
    pos = Math.max(0, Math.min(1, pos));
    video.currentTime = pos * video.duration;
  }

  progressBar.onpointerdown = (e) => {
    updateSeek(e);
    window.onpointermove = updateSeek;
    window.onpointerup = () => { window.onpointermove = null; };
  };

  video.ontimeupdate = () => {
    const pct = (video.currentTime / video.duration) * 100;
    progressPlayed.style.width = pct + '%';
    progressThumb.style.left = pct + '%';
  };

  // Fullscreen
  fullscreenBtn.onclick = () => {
    if (!document.fullscreenElement) rootPlayer.requestFullscreen();
    else document.exitFullscreen();
  };
</script>
<script src="/PW/player.js"></script>
</body>
</html>
