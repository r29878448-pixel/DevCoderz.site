<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Lecture Player</title>
    <link rel="stylesheet" href="https://gray-madelina-19.tiiny.site/ogx.css">
    <link rel="stylesheet" href="https://gray-madelina-19.tiiny.site/plyrx55.css">
    <style>body { margin:0; background:#000; } .video-container { width:100%; height:auto; position:relative; }</style>
</head>
<body>

<div class="video-container">
    <video id="lecture-player" playsinline autoplay></video>
</div>

<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.11/dist/shaka-player.compiled.js"></script>
<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

<script>
(async function() {
    const params = new URLSearchParams(window.location.search);
    const videoId = params.get('video_id');
    const batchId = params.get('batch_id');
    const subjectId = params.get('subject_id');
    const lectureName = params.get('name') || "Lecture";

    // 1. API se data fetch karo
    const response = await fetch(`https://devcoderz-player.vercel.app/api/stream.js?video_id=${videoId}&batch_id=${batchId}&subject_id=${subjectId}`);
    const data = await response.json();

    const manifestUrl = data.manifest; // API se aane wala MPD link
    const keyId = data.kid;
    const keyValue = data.k;

    const videoEl = document.getElementById('lecture-player');
    const shakaPlayer = new shaka.Player(videoEl);

    shakaPlayer.configure({ drm: { clearKeys: { [keyId]: keyValue } } });

    const manifestObj = new URL(manifestUrl);
    shakaPlayer.getNetworkingEngine().registerRequestFilter((type, request) => {
        if (type !== shaka.net.NetworkingEngine.RequestType.SEGMENT) return;
        manifestObj.searchParams.forEach((v, k) => {
            const segUrl = new URL(request.uris[0]);
            segUrl.searchParams.set(k, v);
            request.uris[0] = segUrl.toString();
        });
    });

    await shakaPlayer.load(manifestUrl);
    new Plyr(videoEl, { autoplay: true });
})();
</script>
</body>
</html>
