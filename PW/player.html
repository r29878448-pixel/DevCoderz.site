<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The DevCoderZ Player</title>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.11/dist/shaka-player.compiled.min.js"></script>
    <style>
        :root { --primary: #0ea5e9; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: sans-serif; overflow: hidden; }
        
        #player-container { position: relative; width: 100vw; height: 100vh; background: #000; }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* Fixed Branding */
        .brand-logo { position: absolute; top: 15px; left: 15px; z-index: 100; color: var(--primary); font-weight: 900; font-size: 18px; pointer-events: none; }

        /* Controls */
        .controls-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); z-index: 50; }
        .progress-track { width: 100%; height: 6px; background: rgba(255,255,255,0.2); border-radius: 5px; cursor: pointer; margin-bottom: 15px; }
        #progress-fill { height: 100%; width: 0%; background: var(--primary); border-radius: 5px; }
        
        .btn-row { display: flex; justify-content: space-between; align-items: center; color: #fff; }
        .btns-group { display: flex; gap: 20px; align-items: center; }
        .icon-btn { background: none; border: none; color: #fff; cursor: pointer; font-size: 18px; padding: 5px; }
    </style>
</head>
<body>

<div id="player-container">
    <video id="video" playsinline></video>
    <div class="brand-logo">THE DEVCODERZ</div>

    <div class="controls-overlay">
        <div class="progress-track" id="progress-container"><div id="progress-fill"></div></div>
        
        <div class="btn-row">
            <div class="btns-group">
                <button class="icon-btn" onclick="seek(-10)">⟲ 10</button>
                <button class="icon-btn" id="playPause">▶</button>
                <button class="icon-btn" onclick="seek(10)">10 ⟳</button>
            </div>
            <div class="btns-group">
                <button class="icon-btn" onclick="toggleFS()">⛶</button>
            </div>
        </div>
    </div>
</div>

<script src="/PW/player.js"></script>
<script>
    const video = document.getElementById('video');
    const player = new shaka.Player(video);
    const progressFill = document.getElementById('progress-fill');
    const playPauseBtn = document.getElementById('playPause');

    // Shaka Player Initialization
    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        const source = urlParams.get("Url");
        
        if (source) {
            try {
                await player.load(decodeURIComponent(source));
            } catch (e) {
                console.error("Error loading stream:", e);
            }
        }
    }

    playPauseBtn.onclick = () => {
        video.paused ? video.play() : video.pause();
        playPauseBtn.textContent = video.paused ? "▶" : "❚❚";
    };

    video.ontimeupdate = () => {
        if(video.duration) {
            progressFill.style.width = (video.currentTime / video.duration) * 100 + "%";
        }
    };

    function seek(sec) { video.currentTime += sec; }
    function toggleFS() {
        if (!document.fullscreenElement) document.getElementById('player-container').requestFullscreen();
        else document.exitFullscreen();
    }

    init();
</script>
</body>
</html>
