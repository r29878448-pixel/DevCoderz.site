<!DOCTYPE html>
<html lang="hi" style="user-select: none;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Player Engine</title>
    <style>
        :root { --accent: #0ea5e9; --accentl: #7dd3fc; --bg: #000; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #player-ui { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        video { width: 100%; height: 100%; object-fit: contain; background: #000; }
        
        /* Branding */
        .brand { position: absolute; top: 20px; left: 20px; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--accentl); border: 1px solid var(--accent); padding: 4px 8px; border-radius: 4px; pointer-events: none; opacity: 0.8; z-index: 10; }
        
        /* Double Tap Layer */
        .tap-layer { position: absolute; inset: 0; display: flex; z-index: 5; }
        .tap-box { flex: 1; }

        /* Controls */
        .ui-controls { position: absolute; bottom: 0; width: 100%; padding: 25px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); z-index: 20; transition: opacity 0.3s; }
        .time-row { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; font-size: 12px; font-weight: 600; }
        .progress-track { flex: 1; height: 5px; background: rgba(255,255,255,0.2); cursor: pointer; position: relative; border-radius: 3px; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; border-radius: 3px; position: relative; }
        .progress-thumb { position: absolute; right: 0; top: -3px; width: 12px; height: 12px; background: #fff; border-radius: 50%; box-shadow: 0 0 10px var(--accentl); }
        
        .buttons-row { display: flex; align-items: center; gap: 20px; }
        .icon-btn { cursor: pointer; font-size: 20px; color: #fff; background: none; border: none; padding: 5px; transition: transform 0.2s; }
        .icon-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

<div id="player-ui">
    <div class="brand">Developed by Devansh Sharma</div>
    
    <div class="tap-layer">
        <div class="tap-box" id="leftTap"></div>
        <div class="tap-box" id="rightTap"></div>
    </div>

    <video id="video" playsinline></video>

    <div class="ui-controls" id="controls">
        <div class="time-row">
            <span id="curTime">00:00:00</span>
            <div class="progress-track" id="track">
                <div class="progress-fill" id="fill"><div class="progress-thumb"></div></div>
            </div>
            <span id="durTime">00:00:00</span>
        </div>
        
        <div class="buttons-row">
            <button class="icon-btn" id="playBtn">▶</button>
            <button class="icon-btn" id="fullBtn">⛶</button>
            <button class="icon-btn" id="dlBtn">⬇</button>
            <button class="icon-btn" id="attBtn">📎</button>
            <button class="icon-btn" id="setBtn">⚙</button>
        </div>
    </div>
</div>

<script src="/PW/player.js"></script>
<script>
    const video = document.getElementById('video');
    const fill = document.getElementById('fill');
    const track = document.getElementById('track');
    
    // Time Format Logic
    function formatTime(s) {
        let h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = Math.floor(s % 60);
        return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
    }

    video.addEventListener('timeupdate', () => {
        let pct = (video.currentTime / video.duration) * 100;
        fill.style.width = pct + '%';
        document.getElementById('curTime').innerText = formatTime(video.currentTime);
        document.getElementById('durTime').innerText = formatTime(video.duration || 0);
    });

    // Double Tap Logic
    let lastTap = 0;
    document.getElementById('leftTap').onclick = () => {
        if(Date.now() - lastTap < 300) video.currentTime -= 10;
        lastTap = Date.now();
    };
    document.getElementById('rightTap').onclick = () => {
        if(Date.now() - lastTap < 300) video.currentTime += 10;
        lastTap = Date.now();
    };

    // Smooth Drag
    track.onpointerdown = (e) => {
        const rect = track.getBoundingClientRect();
        video.currentTime = ((e.clientX - rect.left) / rect.width) * video.duration;
    };

    // UI Toggle
    document.getElementById('playBtn').onclick = () => {
        video.paused ? video.play() : video.pause();
        document.getElementById('playBtn').innerText = video.paused ? "▶" : "⏸";
    };

    document.getElementById('fullBtn').onclick = () => {
        !document.fullscreenElement ? document.getElementById('player-ui').requestFullscreen() : document.exitFullscreen();
    };
    
    // Note: ensure player.js is loaded correctly and exports required functions.
</script>
</body>
</html>
