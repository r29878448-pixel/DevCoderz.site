<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Player</title>
<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.11/dist/shaka-player.compiled.min.js"></script>
<style>
* { box-sizing: border-box; }
body, html { margin:0; padding:0; background:#050505; color:#fff; height:100%; overflow:hidden; font-family: 'Segoe UI', sans-serif; }
#player-ui { position:relative; width:100vw; height:100vh; }
video { width:100%; height:100%; object-fit:contain; }
.brand { position:absolute; top:15px; left:20px; color:rgba(255,255,255,0.3); font-size:14px; letter-spacing:1px; z-index:10; }
#loader { position:absolute; inset:0; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:200; }
.controls { position:absolute; bottom:0; width:100%; padding:15px 20px; background:linear-gradient(transparent, rgba(0,0,0,0.9)); z-index:100; }
.bar-bg { width:100%; height:4px; background:rgba(255,255,255,0.2); margin-bottom:15px; cursor:pointer; }
.bar-fill { height:100%; width:0%; background:#3b82f6; position:relative; }
.bar-fill::after { content:''; position:absolute; right:0; top:-3px; width:10px; height:10px; background:#fff; border-radius:50%; }
.nav-row { display:flex; align-items:center; gap:20px; }
.btn-icon { cursor:pointer; font-size:18px; user-select:none; }
.settings-panel { position:absolute; bottom:60px; right:20px; background:#181818; border:1px solid #333; padding:15px; border-radius:8px; display:none; }
.setting-group { margin-bottom:12px; }
select { background:#222; color:#fff; border:none; padding:5px; width:100%; }
</style>
</head>
<body>

<div id="player-ui">
<div class="brand">THE DEVCODERZ</div>
<div id="loader">
<div id="status-text" style="margin-bottom:10px;">Connecting to server...</div>
<button id="start-btn" style="display:none; padding:10px 20px; background:#3b82f6; border:none; color:white; border-radius:4px;" onclick="initStream()">PLAY VIDEO</button>
</div>
<video id="v" playsinline></video>
<div style="position:absolute; inset:0; display:flex;">
<div style="flex:1" onclick="skip(-10)"></div>
<div style="flex:1" onclick="skip(10)"></div>
</div>
<div class="controls">
<div class="bar-bg" id="seek-bar"><div class="bar-fill" id="played"></div></div>
<div class="nav-row">
<div class="btn-icon" id="play-pause">▶</div>
<div class="btn-icon" onclick="document.querySelector('.settings-panel').style.display='block'">⚙</div>
<div class="btn-icon" onclick="window.location.href='download.html'">⬇</div>
</div>
</div>
<div class="settings-panel">
<div class="setting-group"><label>Playback Speed</label>
<select onchange="v.playbackRate=this.value">
<option value="1">Normal</option><option value="1.5">1.5x</option><option value="2">2x</option><option value="3">3x</option>
</select></div>
<div class="setting-group"><label>Resolution</label>
<select><option>Auto</option><option>720p</option><option>480p</option></select></div>
</div>
</div>

<script src="/PW/player.js"></script>
<script>
const v = document.getElementById('v'), pp = document.getElementById('play-pause'), bar = document.getElementById('seek-bar');
const loader = document.getElementById('loader'), status = document.getElementById('status-text');

async function initStream() {
    loader.style.display = 'none';
    v.play();
    if(typeof initPlayer === 'function') await initPlayer();
}

setTimeout(() => {
    status.innerText = "Ready to stream";
    document.getElementById('start-btn').style.display = 'block';
}, 1500);

pp.onclick = () => { v.paused ? v.play() : v.pause(); pp.textContent = v.paused ? "▶" : "⏸"; };
bar.onclick = (e) => { v.currentTime = (e.offsetX / bar.offsetWidth) * v.duration; };
function skip(s) { v.currentTime += s; }
v.ontimeupdate = () => document.getElementById('played').style.width = (v.currentTime/v.duration)*100 + "%";
</script>
</body>
</html>
