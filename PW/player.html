<!DOCTYPE html><html lang="hi" style="user-select: none;"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Mtaiirus Player</title>
  <link rel="icon" type="image/x-icon" href="https://i.ibb.co/G3TLgSgJ/pngtree-mv-vm-letter-vector-logo-image-332121.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800;900&amp;family=DM+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.11/dist/shaka-player.compiled.min.js"></script><style type="text/css">* {user-select: auto !important; -webkit-user-select: auto !important;}</style><input type="hidden" id="inject_idm_text_selection">
  <style>
    :root {
      --bg: #1A1814;
      --glass: #25221E;
      --glass2: #2D2925;
      --line: rgba(240,168,122,.18);
      --text: #F5F2EB;
      --muted: rgba(245,242,235,.55);
      --accent: #D4540E;
      --accentl: #F0A87A;
      --green: #4ade80;
      --danger: #f87171;
      --shadow: 0 30px 90px rgba(0,0,0,.65);
      --radius: 16px;
      --font-heading: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    * { box-sizing: border-box }
    html, body { height: 100% }
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      color: var(--text);
      font-family: var(--font-body);
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    button {
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: 100vw;
      height: 100dvh;
      display: flex;
      background: #000;
      overflow: hidden;
    }

    .main {
      position: relative;
      flex: 1;
      min-width: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(circle at 15% 0%, rgba(212,84,14,.14), transparent 26%),
        radial-gradient(circle at 70% 5%, rgba(240,168,122,.10), transparent 25%),
        #000;
    }

    .player {
      position: relative;
      flex: 1;
      min-height: 0;
      background: #000;
      overflow: hidden;
      user-select: none;
      isolation: isolate;
    }

    .player video,
    .youtube-layer,
    #ytContainer,
    #ytContainer iframe {
      position: absolute !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      border: 0 !important;
      background: #000;
    }

    .player video { object-fit: contain; }

    .youtube-click-layer {
      position: absolute;
      inset: 0;
      z-index: 2;
      background: transparent;
      cursor: pointer;
    }

    .recorded-badge {
      position: absolute;
      z-index: 23;
      top: 18px;
      left: 18px;
      padding: 6px 13px;
      border-radius: 999px;
      border: 1px solid rgba(240,168,122,.22);
      background: rgba(26,24,20,.74);
      color: var(--accentl);
      font-family: var(--font-heading);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1.2px;
      box-shadow: 0 8px 22px rgba(0,0,0,.38);
      pointer-events: none;
    }

    .topbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 22;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px;
      opacity: 0;
      transform: translateY(-8px);
      transition: .22s ease;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(26,24,20,.60), transparent);
    }

    .controls-visible .topbar {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .top-left, .top-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .icon-btn, .ctrl-btn {
      border: 1px solid rgba(240,168,122,.14);
      background: linear-gradient(180deg, rgba(45,41,37,.18), rgba(26,24,20,.18));
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: var(--text);
      cursor: pointer;
      display: grid;
      place-items: center;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06), 0 8px 18px rgba(0,0,0,.35);
      transition: .16s ease;
    }

    .icon-btn { width: 38px; height: 38px; border-radius: 10px; }
    .ctrl-btn { width: 37px; height: 37px; border-radius: 10px; }

    .icon-btn:hover, .ctrl-btn:hover {
      border-color: rgba(240,168,122,.4);
      color: #fff;
      box-shadow: 0 0 22px rgba(212,84,14,.15), inset 0 1px 0 rgba(255,255,255,.08);
      transform: translateY(-1px);
    }

    .ctrl-btn.play {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border-color: rgba(212,84,14,.45);
      background: linear-gradient(135deg, #D4540E, #e8651f);
      box-shadow: 0 0 30px rgba(212,84,14,.35), inset 0 1px 0 rgba(255,255,255,.18);
    }

    .ctrl-btn.purple { color: var(--accentl); }

    .center-play {
      position: absolute;
      z-index: 18;
      left: 50%;
      top: 50%;
      transform: translate(-50%,-50%);
      width: 78px;
      height: 78px;
      border-radius: 50%;
      border: 1px solid rgba(240,168,122,.35);
      background: rgba(26,24,20,.78);
      color: var(--accentl);
      display: grid;
      place-items: center;
      cursor: pointer;
      box-shadow: 0 0 0 8px rgba(212,84,14,.07), 0 0 42px rgba(212,84,14,.25);
      transition: .22s ease;
      opacity: 1;
    }

    .center-play svg { width: 38px; height: 38px; margin-left: 4px }
    .center-play.pause svg { margin-left: 0 }

    .playing:not(.controls-visible) .center-play {
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%,-50%) scale(.88);
    }

    .loader {
      position: absolute;
      z-index: 30;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 64px;
      background: rgba(26,24,20,.72);
      text-align: center;
    }

    .loader.show { display: flex }

    .spinner-bold {
      width: 66px;
      height: 66px;
      border-radius: 50%;
      border: 6px solid rgba(245,242,235,.12);
      border-top-color: var(--accentl);
      border-right-color: var(--accent);
      animation: spin .85s linear infinite;
      box-shadow: 0 0 35px rgba(240,168,122,.2);
    }

    .loader p {
      margin: 16px 0 0;
      font-family: var(--font-heading);
      font-size: 15px;
      font-weight: 800;
      letter-spacing: .3px;
    }

    .load-line {
      width: 230px;
      height: 8px;
      margin-top: 15px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(245,242,235,.1);
    }

    .load-line span {
      display: block;
      height: 100%;
      width: 0;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accentl), var(--accent));
      transition: .25s ease;
    }

    @keyframes spin { to { transform: rotate(360deg) } }

    .buffering-bar {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 3px;
      z-index: 31;
      overflow: hidden;
      background: rgba(245,242,235,.06);
    }

    .buffering-bar-inner {
      height: 100%;
      width: 42%;
      background: linear-gradient(90deg, transparent, var(--accentl), transparent);
      animation: bufferMove 1.15s linear infinite;
    }

    @keyframes bufferMove {
      0% { transform: translateX(-100%) }
      100% { transform: translateX(260%) }
    }

    .buffering-spinner {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 31;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: 5px solid rgba(245,242,235,.15);
      border-top-color: var(--accentl);
      animation: spin .7s linear infinite;
      transform: translate(-50%,-50%);
    }

    .footer {
      position: absolute;
      z-index: 24;
      left: 18px;
      right: 18px;
      bottom: 18px;
      border-radius: 14px;
      padding: 11px 16px 12px;
      background: linear-gradient(180deg, rgba(37,34,30,.92), rgba(26,24,20,.93));
      border: 1px solid var(--line);
      box-shadow: 0 20px 54px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.05);
      backdrop-filter: blur(16px);
      opacity: 0;
      transform: translateY(13px);
      pointer-events: none;
      transition: .22s ease;
    }

    .controls-visible .footer {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .progress-area {
      display: grid;
      grid-template-columns: 82px 1fr 84px;
      align-items: center;
      gap: 10px;
      margin-bottom: 11px;
      font-family: var(--font-heading);
      font-size: 14px;
      font-weight: 800;
      color: #fff;
      text-shadow: 0 2px 8px #000;
    }

    .time-current { text-align: right }
    .time-total { text-align: left }

    .progress-bar {
      position: relative;
      height: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      touch-action: none;
    }

    .progress-bar:before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      height: 6px;
      border-radius: 999px;
      background: rgba(245,242,235,.1);
      box-shadow: inset 0 1px 4px rgba(0,0,0,.45);
    }

    .progress-loaded, .progress-played {
      position: absolute;
      left: 0;
      top: 50%;
      height: 6px;
      transform: translateY(-50%);
      border-radius: 999px;
      pointer-events: none;
    }

    .progress-loaded { background: rgba(245,242,235,.2); width: 0 }
    .progress-played {
      background: linear-gradient(90deg, var(--accentl), var(--accent));
      box-shadow: 0 0 16px rgba(240,168,122,.28);
      width: 0;
    }

    .progress-thumb {
      position: absolute;
      top: 50%;
      left: 0;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      transform: translate(-50%,-50%);
      background: var(--accentl);
      border: 3px solid #1A1814;
      box-shadow: 0 0 0 4px rgba(240,168,122,.18), 0 0 24px rgba(240,168,122,.45);
      pointer-events: none;
    }

    .controls-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .controls-left, .controls-right {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
    }

    .volume-box { display: flex; align-items: center; gap: 8px; }

    .volume-range {
      position: relative;
      width: 82px;
      height: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
    }

    .volume-range:before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      height: 6px;
      border-radius: 999px;
      background: rgba(245,242,235,.12);
    }

    .volume-fill {
      position: absolute;
      left: 0;
      top: 50%;
      height: 6px;
      transform: translateY(-50%);
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accentl), var(--green));
      width: 100%;
    }

    .volume-thumb {
      position: absolute;
      left: 100%;
      top: 50%;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      transform: translate(-50%,-50%);
      background: var(--accentl);
      box-shadow: 0 0 15px rgba(240,168,122,.4);
    }

    .settings-panel {
      position: absolute;
      z-index: 40;
      right: 18px;
      bottom: 98px;
      width: 320px;
      max-height: calc(100dvh - 145px);
      border-radius: 14px;
      overflow: hidden;
      background: var(--glass);
      box-shadow: 0 24px 80px rgba(0,0,0,.70);
      border: 1px solid rgba(245,242,235,.08);
      display: none;
    }

    .settings-panel.show { display: block }

    .settings-main { padding: 8px }

    .set-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 8px 10px 12px;
      border-radius: 9px;
      color: var(--muted);
      cursor: pointer;
      transition: .15s ease;
    }

    .set-row:hover { background: var(--glass2) }

    .set-label { font-size: 16px; font-weight: 700; }

    .set-value {
      min-width: 98px;
      height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
      padding: 0 6px 0 12px;
      background: var(--glass2);
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .settings-head {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(245,242,235,.08);
    }

    .back-small {
      width: 30px;
      height: 30px;
      border: 0;
      border-radius: 50%;
      background: transparent;
      color: #fff;
      cursor: pointer;
      display: grid;
      place-items: center;
    }

    .settings-head h3 { margin: 0; font-family: var(--font-heading); font-size: 16px; }

    .option {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 13px 20px;
      cursor: pointer;
      font-weight: 600;
      color: var(--muted);
      transition: .14s ease;
    }

    .option:hover { background: rgba(245,242,235,.04) }
    .option.active { background: rgba(212,84,14,.2); color: #fff }

    .radio {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid rgba(245,242,235,.25);
      display: grid;
      place-items: center;
    }

    .option.active .radio { border-color: var(--accent) }
    .option.active .radio:after {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
    }

    .side-panel {
      width: 380px;
      max-width: 44vw;
      height: 100%;
      background: var(--glass);
      border-left: 1px solid rgba(245,242,235,.08);
      display: none;
      flex-direction: column;
      z-index: 50;
    }

    .side-panel.show { display: flex }

    .side-head {
      height: 58px;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid rgba(245,242,235,.08);
    }

    .side-head h3 { margin: 0; font-family: var(--font-heading); font-size: 18px; }

    .side-scroll { flex: 1; min-height: 0; overflow: auto; padding: 10px; }

    .lecture-card {
      display: flex;
      gap: 12px;
      padding: 10px;
      border-bottom: 1px solid rgba(245,242,235,.05);
      cursor: pointer;
      border-radius: 10px;
    }

    .lecture-card:hover, .lecture-card.active { background: rgba(245,242,235,.05) }

    .lecture-card img {
      width: 128px;
      aspect-ratio: 16/9;
      object-fit: cover;
      background: #000;
      border-radius: 8px;
      flex: 0 0 auto;
    }

    .lecture-title {
      margin: 3px 0 0;
      font-family: var(--font-heading);
      font-size: 14px;
      line-height: 1.25;
      font-weight: 700;
      color: #fff;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .lecture-duration { margin-top: 8px; font-size: 12px; color: rgba(245,242,235,.45); }

    .attachment-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: var(--glass2);
      border: 1px solid rgba(245,242,235,.08);
      border-radius: 10px;
      color: var(--muted);
      margin-bottom: 8px;
      text-decoration: none;
    }

    .attachment-card span {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 600;
      font-size: 14px;
    }

    .empty {
      height: 100%;
      display: grid;
      place-items: center;
      color: rgba(245,242,235,.35);
      font-weight: 600;
      text-align: center;
      padding: 30px;
    }

    .error-state {
      position: absolute;
      inset: 0;
      z-index: 35;
      display: none;
      place-items: center;
      background: rgba(26,24,20,.88);
      padding: 20px;
    }

    .error-state.show { display: grid }

    .error-card { max-width: 430px; text-align: center; }

    .error-card h2 { margin: 0 0 10px; font-family: var(--font-heading); }
    .error-card p { color: var(--muted); }

    .error-card button {
      border: 0;
      border-radius: 10px;
      padding: 11px 18px;
      background: var(--accent);
      color: white;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--font-body);
    }

    .meta-bottom {
      position: absolute;
      left: 50%;
      bottom: 118px;
      transform: translateX(-50%);
      z-index: 19;
      opacity: 0;
      transition: .2s ease;
      pointer-events: none;
    }

    .controls-visible .meta-bottom { opacity: 1 }

    .watermark {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(26,24,20,.45);
      border: 1px solid rgba(240,168,122,.18);
      color: var(--accentl);
      font-family: var(--font-heading);
      font-weight: 800;
      letter-spacing: .8px;
      text-shadow: 0 0 14px rgba(240,168,122,.45);
    }

    .watermark img {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 0 18px rgba(240,168,122,.3);
    }

    @media (max-width: 768px) {
      .app { display: block }
      .side-panel { position: absolute; right: 0; top: 0; bottom: 0; width: 100%; max-width: none; }
      .footer { left: 8px; right: 8px; bottom: calc(8px + env(safe-area-inset-bottom)); padding: 8px; border-radius: 13px; }
      .topbar { padding: 12px }
      .recorded-badge { top: 12px; left: 12px }
      .progress-area { grid-template-columns: 46px minmax(0, 1fr) 58px !important; gap: 6px !important; font-size: 11px !important; margin-bottom: 8px !important; }
      .controls-row { width: 100%; display: grid !important; grid-template-columns: minmax(0, 1fr) auto; align-items: center; gap: 6px !important; }
      .controls-left { justify-content: flex-start; overflow: hidden; }
      .controls-right { justify-content: flex-end; flex-shrink: 0; }
      .volume-box { display: none !important; }
      .ctrl-btn, .icon-btn { width: 32px !important; height: 32px !important; min-width: 32px !important; border-radius: 9px !important; }
      .ctrl-btn.play { width: 38px !important; height: 38px !important; min-width: 38px !important; }
      #fullscreenBtn { display: grid !important; visibility: visible !important; opacity: 1 !important; }
      .settings-panel { right: 8px; bottom: calc(140px + env(safe-area-inset-bottom)) !important; width: min(320px, calc(100vw - 16px)); }
      .meta-bottom { display: none }
    }

    @media (max-width: 430px) {
      .footer { left: 6px !important; right: 6px !important; }
      .controls-row { gap: 4px !important; }
      .controls-left, .controls-right { gap: 4px !important; }
      .ctrl-btn, .icon-btn { width: 30px !important; height: 30px !important; min-width: 30px !important; }
      .ctrl-btn.play { width: 36px !important; height: 36px !important; min-width: 36px !important; }
    }

    #rootPlayer:fullscreen .footer,
    #rootPlayer:-webkit-full-screen .footer,
    #player:fullscreen .footer,
    #player:-webkit-full-screen .footer {
      bottom: calc(10px + env(safe-area-inset-bottom)) !important;
    }

    #rootPlayer:fullscreen .settings-panel,
    #rootPlayer:-webkit-full-screen .settings-panel,
    #player:fullscreen .settings-panel,
    #player:-webkit-full-screen .settings-panel {
      bottom: calc(92px + env(safe-area-inset-bottom)) !important;
    }
  </style>
<script src="./html-js/aut.js" async=""></script><style></style></head>

<body>
  <div class="app">
    <main id="rootPlayer" class="main controls-visible">
      <section id="player" class="player controls-visible">
        <video id="video" playsinline=""></video>

        <div id="youtubeLayer" class="youtube-layer" style="display:none;">
          <div id="ytContainer"></div>
          <div class="youtube-click-layer" id="ytClickLayer"></div>
        </div>

        <div class="recorded-badge">RECORDED</div>

        <div id="topbar" class="topbar">
          <div class="top-left">
            <button id="backBtn" class="icon-btn" title="Back">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M19 12H5" stroke-width="1.8" stroke-linecap="round"></path>
                <path d="M12 19L5 12L12 5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
            </button>
          </div>
          <div class="top-right">
            <button id="fullscreenBtn2" class="icon-btn" title="Fullscreen">
              <svg id="fullscreenIcon" width="20" height="20" viewBox="0 0 24 24" fill="none">
                <path d="M4 8V4h4M20 8V4h-4M4 16v4h4M20 16v4h-4" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
            </button>
            <button id="downloadBtn" class="ctrl-btn purple" title="Download/Open">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"></path>
              </svg>
            </button>
            <button id="settingsBtn" class="icon-btn" title="Settings">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"></path>
              </svg>
            </button>
          </div>
        </div>

        <button id="centerPlay" class="center-play" title="Play/Pause"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"></path></svg></button>

        <div class="meta-bottom">
          <div class="watermark">
            <img src="https://i.ibb.co/G3TLgSgJ/pngtree-mv-vm-letter-vector-logo-image-332121.jpg" alt="Mtaiirus" onerror="this.style.display='none'">
            <span>Mtaiirus</span>
          </div>
        </div>

        <div id="loader" class="loader">
          <div class="spinner-bold"></div>
          <p id="loaderText">Initializing...</p>
          <div class="load-line"><span id="loaderBar" style="width: 0%;"></span></div>
          <p id="loaderPercent">0%</p>
        </div>

        <div id="buffering" style="display:none;">
          <div class="buffering-bar"><div class="buffering-bar-inner"></div></div>
          <div class="buffering-spinner"></div>
        </div>

        <div id="errorState" class="error-state show">
          <div class="error-card">
            <h2 id="errorTitl">Use another player</h2>
            <p id="errorTex">Click below to play</p>
            <button onclick="redirectToPlayer()">Play video</button>
          </div>
        </div>

        <div id="settingsPanel" class="settings-panel">
          <div id="settingsMain" class="settings-main">
            <div class="set-row" data-open="speed">
              <span class="set-label">Speed</span>
              <span class="set-value"><span id="speedValue">1</span><svg width="20" height="20" viewBox="0 0 20 20"><path d="M8 14L12 10L8 6L8 14Z" fill="#B3B3BC"></path></svg></span>
            </div>
            <div id="qualityRow" class="set-row" data-open="quality" style="display:none;">
              <span class="set-label">Quality</span>
              <span class="set-value"><span id="qualityValue">Auto</span><svg width="20" height="20" viewBox="0 0 20 20"><path d="M8 14L12 10L8 6L8 14Z" fill="#B3B3BC"></path></svg></span>
            </div>
          </div>
          <div id="speedSub" style="display:none;"></div>
          <div id="qualitySub" style="display:none;"></div>
        </div>

        <div id="footer" class="footer">
          <div class="progress-area">
            <span id="currentTime" class="time-current">00:00</span>
            <div id="progressBar" class="progress-bar">
              <div id="progressLoaded" class="progress-loaded" style="width: 0%;"></div>
              <div id="progressPlayed" class="progress-played" style="width: 0%;"></div>
              <div id="progressThumb" class="progress-thumb" style="left: 0%;"></div>
            </div>
            <span id="durationTime" class="time-total">00:00</span>
          </div>

          <div class="controls-row">
            <div class="controls-left">
              <button id="rewindBtn" class="ctrl-btn" title="-10 sec">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M11 7v10l-7-5 7-5zm9 0v10l-7-5 7-5z"></path></svg>
              </button>

              <button id="playBtn" class="ctrl-btn play" title="Play/Pause">
                <svg id="playIcon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"></path></svg>
              </button>

              <button id="forwardBtn" class="ctrl-btn" title="+10 sec">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M4 7v10l7-5-7-5zm9 0v10l7-5-7-5z"></path></svg>
              </button>

              <div class="volume-box">
                <button id="muteBtn" class="ctrl-btn" title="Mute">
                  <svg id="volumeIcon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 4V5L7 9H3zm13.5 3A4.5 4.5 0 0014 8v8a4.5 4.5 0 002.5-4z"></path></svg>
                </button>
                <div id="volumeRange" class="volume-range">
                  <div id="volumeFill" class="volume-fill" style="width: 100%;"></div>
                  <div id="volumeThumb" class="volume-thumb" style="left: 100%;"></div>
                </div>
              </div>
            </div>

            <div class="controls-right">
              <button id="attachmentsBtn" class="ctrl-btn" title="Attachments">
                <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 115.66 5.66l-9.2 9.19a2 2 0 01-2.82-2.83l8.48-8.48"></path></svg>
              </button>
              <button id="lecturesBtn" class="ctrl-btn" title="Lectures">
                <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M4 6h16M4 12h16M4 18h16"></path></svg>
              </button>
              <button id="fullscreenBtn" class="icon-btn" title="Fullscreen">
                <svg id="fullscreenIcon" width="20" height="20" viewBox="0 0 24 24" fill="none">
                  <path d="M4 8V4h4M20 8V4h-4M4 16v4h4M20 16v4h-4" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <aside id="lecturePanel" class="side-panel">
      <div class="side-head">
        <h3>Lectures</h3>
        <button class="icon-btn" id="closeLectures">✕</button>
      </div>
      <div id="lectureList" class="side-scroll"><div class="empty">No lectures loaded.</div></div>
    </aside>

    <aside id="attachmentPanel" class="side-panel">
      <div class="side-head">
        <h3>Attachments</h3>
        <button class="icon-btn" id="closeAttachments">✕</button>
      </div>
      <div id="attachmentList" class="side-scroll"><div class="empty">No attachments available.</div></div>
    </aside>
  </div>

  
  </script>
  <script src="/PW/player.js"></script>


</body></html>
