<!DOCTYPE html>
<html>
<head>
    <title>Delta Premium Player</title>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.11/dist/shaka-player.compiled.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #video { width: 90%; max-width: 900px; }
        #status { color: #00ff00; font-family: monospace; margin-top: 10px; }
    </style>
</head>
<body>

    <video id="video" controls autoplay></video>
    <div id="status">Initializing...</div>

    <script>
        const video = document.getElementById('video');
        const status = document.getElementById('status');
        const player = new shaka.Player(video);

        async function initPlayer() {
            try {
                // 1. API - Video Details (Manifest URL)
                status.innerText = "Connecting to Server...";
                const vidRes = await fetch('/api/proxy?endpoint=video-url-details').then(r => r.json());
                const manifestUrl = vidRes.data[0].url;

                // 2. API - Datacontent (Extracting Keys)
                status.innerText = "Extracting Keys...";
                const keyRes = await fetch('/api/proxy?endpoint=datacontent').then(r => r.json());
                
                // Key Parsing logic
                const keys = typeof keyRes.data === 'string' ? JSON.parse(atob(keyRes.data)) : keyRes.data;
                const KID = keys.keyid; // 554eb551...
                const KEY = keys.key;   // 85c2f3ba...

                // 3. Authorizing Access (DRM Config)
                status.innerText = "Authorizing Access...";
                player.configure({
                    drm: {
                        clearKeys: { [KID]: KEY }
                    }
                });

                // 4. Network Filter (Injecting Headers/Referer)
                player.getNetworkingEngine().registerRequestFilter((type, request) => {
                    request.headers['Referer'] = 'https://www.pw.live/';
                    request.headers['User-Agent'] = 'Mozilla/5.0';
                });

                // 5. Initializing Player
                status.innerText = "Initializing Player...";
                await player.load(manifestUrl);
                status.innerText = "Playback Started!";

            } catch (e) {
                status.style.color = "red";
                status.innerText = "Error: " + e.message;
                console.error("DRM Init Error:", e);
            }
        }

        initPlayer();
    </script>
</body>
</html>
