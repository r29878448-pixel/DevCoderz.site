<!DOCTYPE html>
<html>
<head>
    <title>Auto-Play DASH</title>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.11/dist/shaka-player.compiled.js"></script>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <style>body{margin:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh} video{width:100%;max-width:900px}</style>
</head>
<body>
    <video id="video" controls playsinline></video>
    <script>
        (async function() {
            const params = new URLSearchParams(window.location.search);
            const vId = params.get('video_id'), bId = params.get('batch_id'), sId = params.get('subject_id');
            const video = document.getElementById('video');
            const player = new shaka.Player(video);

            try {
                // 1. Fetch Manifest URL
                const res = await fetch(`/api/proxy?endpoint=video-url-details&batchId=${bId}&childId=${vId}&subjectId=${sId}`);
                const vidRes = await res.json();
                const manifestUrl = vidRes.data[0].url;

                // 2. Segment Filter: Har segment mein parameters inject karega
                player.getNetworkingEngine().registerRequestFilter((type, request) => {
                    request.headers["Referer"] = "https://www.pw.live/";
                    if (type === shaka.net.NetworkingEngine.RequestType.SEGMENT) {
                        const mUrl = new URL(manifestUrl);
                        const sUrl = new URL(request.uris[0]);
                        mUrl.searchParams.forEach((v, k) => sUrl.searchParams.set(k, v));
                        request.uris[0] = sUrl.toString();
                    }
                });

                // 3. Load & Play
                await player.load(manifestUrl);
                new Plyr(video);
            } catch (e) { 
                console.error("Auto-fetch error:", e); 
            }
        })();
    </script>
</body>
</html>
