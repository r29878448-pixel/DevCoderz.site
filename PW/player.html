<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE  DEVCODERZ</title>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.11/dist/shaka-player.compiled.min.js"></script>
    <style>
        body { margin:0; background:#000; color:#fff; font-family:sans-serif; overflow:hidden; }
        #player-ui { width:100vw; height:100vh; position:relative; }
        video { width:100%; height:100%; object-fit:contain; }
        .branding { position:absolute; top:10px; left:10px; color:#3b82f6; font-weight:bold; z-index:10; }
        
        /* Controls - Screenshot jaisa layout */
        .controls { position:absolute; bottom:0; width:100%; background:#000; padding:15px; box-sizing:border-box; }
        .progress-bar { width:100%; height:4px; background:#444; margin-bottom:10px; cursor:pointer; }
        #played { height:100%; width:0%; background:#888; }
        .row { display:flex; align-items:center; gap:15px; font-size:20px; }
    </style>
</head>
<body>

<div id="player-ui">
    <div class="branding">THE DEVCODERZ</div>
    <video id="v" playsinline></video>
    
    <div class="controls">
        <div class="progress-bar" id="bar"><div id="played"></div></div>
        <div class="row">
            <span style="font-size:12px">0:00<br>/<br>0:00</span>
            <span onclick="seek(-10)">↺10</span>
            <span id="play-pause">▶</span>
            <span onclick="seek(10)">10↻</span>
            <span style="margin-left:auto">🔊 ☰ ⚙️</span>
        </div>
    </div>
</div>

<script src="/PW/player.js"></script>
<script>
    const v = document.getElementById('v');
    const player = new shaka.Player(v);

    // DEBUGGING: Check URL Parameter
    const urlParams = new URLSearchParams(window.location.search);
    const videoUrl = urlParams.get("Url");
    console.log("DEBUG: Video URL found:", videoUrl);

    if (!videoUrl) {
        alert("Error: Video URL parameter missing in your link!");
    }

    async function loadStream() {
        try {
            
            await player.load(decodeURIComponent(videoUrl));
            console.log("Stream Loaded Successfully");
        } catch (e) {
            console.error("DEBUG: Shaka Player Error:", e);
        }
    }

    loadStream();
    
    document.getElementById('play-pause').onclick = () => {
        v.paused ? v.play() : v.pause();
    };
    function seek(s) { v.currentTime += s; }
</script>
</body>
</html>
