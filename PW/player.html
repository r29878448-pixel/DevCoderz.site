<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE DEVCODERZ PREMIUM</title>
<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.11/dist/shaka-player.compiled.min.js"></script>
<style>
body, html { margin:0; padding:0; background:#000; color:#fff; height:100%; overflow:hidden; font-family: sans-serif; }
#player-ui { position:relative; width:100vw; height:100vh; }
video { width:100%; height:100%; object-fit:contain; }
.brand { position:absolute; top:20px; left:20px; color:rgba(14, 165, 233, 0.6); font-weight:800; z-index:10; pointer-events:none; }
#loader { position:absolute; inset:0; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:200; }
.controls { position:absolute; bottom:0; width:100%; padding:20px; background:linear-gradient(transparent, #000); z-index:100; }
.progress-bar { width:100%; height:6px; background:#444; border-radius:3px; position:relative; cursor:pointer; margin-bottom:15px; }
#played { height:100%; width:0%; background:#0ea5e9; border-radius:3px; }
.btn { background:rgba(255,255,255,0.15); border:1px solid #555; padding:8px 15px; border-radius:5px; color:#fff; cursor:pointer; font-size:14px; }
.settings-menu { position:absolute; bottom:80px; right:20px; background:#1a1a1a; padding:20px; border-radius:10px; display:none; border:1px solid #333; z-index:150; }
.menu-item { margin-bottom: 15px; }
select { background: #000; color: #fff; border: 1px solid #555; padding: 5px; width: 100%; }
</style>
</head>
<body>

<div id="player-ui">
<div class="brand">THE DEVCODERZ</div>
<div id="loader">
<h2 id="load-text">Initializing...</h2>
<button class="btn" id="start-btn" style="display:none;" onclick="startVideo()">Click to Start</button>
</div>
<video id="v" playsinline></video>
<div style="position:absolute; inset:0; display:flex;">
<div style="flex:1" onclick="handleTap('left')"></div>
<div style="flex:1" onclick="handleTap('right')"></div>
</div>
<div class="controls">
<div class="progress-bar" id="seek-bar"><div id="played"></div></div>
<div style="display:flex; gap:10px;">
<button class="btn" id="play-pause">Play</button>
<button class="btn" onclick="document.querySelector('.settings-menu').style.display='block'">⚙️ Settings</button>
<button class="btn" onclick="alert('Open Attachments')">📎 Attachments</button>
</div>
</div>
<div class="settings-menu">
<div class="menu-item">
<label>Speed</label>
<select id="speed-sel" onchange="v.playbackRate=this.value">
<option value="1">1x</option><option value="1.25">1.25x</option><option value="1.5">1.5x</option>
<option value="1.75">1.75x</option><option value="2">2x</option><option value="2.25">2.25x</option>
<option value="2.5">2.5x</option><option value="3">3x</option>
</select>
</div>
<div class="menu-item">
<label>Quality</label>
<select id="qlty-sel" onchange="changeQuality(this.value)">
<option value="auto">Auto</option><option value="720">720p</option>
<option value="480">480p</option><option value="320">320p</option><option value="144">144p</option>
</select>
</div>
<button class="btn" onclick="downloadVideo()">⬇ Download</button>
</div>
</div>

<script src="/PW/player.js"></script>
<script>
const v = document.getElementById('v'), pp = document.getElementById('play-pause'), bar = document.getElementById('seek-bar');
const loader = document.getElementById('loader');
bar.onpointerdown = (e) => { const rect = bar.getBoundingClientRect(); v.currentTime = ((e.clientX - rect.left) / rect.width) * v.duration; };
let lastTap = 0;
function handleTap(side) { let now = new Date().getTime(); if(now - lastTap < 400) side === 'left' ? v.currentTime -= 10 : v.currentTime += 10; lastTap = now; }
document.addEventListener('click', (e) => { if(!e.target.closest('.settings-menu') && !e.target.closest('button')) document.querySelector('.settings-menu').style.display = 'none'; });
function startVideo() { loader.style.display = 'none'; v.play(); }
async function init() {
try {
if(typeof initPlayer === 'function') await initPlayer();
document.getElementById('load-text').innerText = "Ready!";
document.getElementById('start-btn').style.display = 'block';
} catch(e) { document.getElementById('load-text').innerText = "Failed!"; }
}
pp.onclick = () => { v.paused ? v.play() : v.pause(); pp.textContent = v.paused ? "Play" : "Pause"; };
v.ontimeupdate = () => document.getElementById('played').style.width = (v.currentTime/v.duration)*100 + "%";
function downloadVideo() { const p = new URLSearchParams(window.location.search); window.location.href = `download.html?v=${p.get('v')}&b=${p.get('b')}`; }
init();
</script>
</body>
</html>
