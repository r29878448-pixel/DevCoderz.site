<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.11/dist/shaka-player.compiled.js"></script>
</head>
<body>
    <video id="video" controls autoplay></video>

    <script>
        const video = document.getElementById('video');
        const player = new shaka.Player(video);

        // URL se parameters extract karna
        const params = new URLSearchParams(window.location.search);
        const manifestUrl = params.get('url'); // URL jo aap pass kar rahe hain
        const kid = params.get('kid');         // Key ID

        async function init() {
            try {
                if (!manifestUrl) {
                    throw new Error("URL parameter missing in the link!");
                }

                // Headers configure karna taaki server ko lage request pw.live se hai
                player.getNetworkingEngine().registerRequestFilter((type, request) => {
                    request.headers['Referer'] = 'https://pw.live/';
                    request.headers['Origin'] = 'https://pw.live/';
                });

                // Agar DRM key mil gayi hai toh apply karein
                if (kid) {
                    player.configure({
                        drm: {
                            clearKeys: { [kid]: "YOUR_KEY_HERE" } // Yahan dynamic key fetching logic aayega
                        }
                    });
                }

                await player.load(manifestUrl);
                console.log("Video Loaded");
            } catch (e) {
                console.error("Error:", e);
                alert("Player Error: " + e.message);
            }
        }
        init();
    </script>
</body>
</html>
