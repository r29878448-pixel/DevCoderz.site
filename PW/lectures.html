<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The DevCoderZ | Lectures</title>
    <link href="https://www.pw.live/batches-new/index.BZrLlnYz.css" rel="stylesheet" type="text/css">
    <style>
        body { background: #f9fafb; font-family: sans-serif; margin: 0; padding-bottom: 60px; }
        .header { background: #4f46e5; color: white; padding: 15px 20px; font-weight: bold; font-size: 1.2rem; display: flex; align-items: center; justify-content: space-between; }
        .wrapper-fOD1sd { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { padding: 8px 16px; border-radius: 8px; border: 1px solid #ddd; background: #fff; cursor: pointer; }
        .tab-btn.active { background: #4f46e5; color: #fff; border-color: #4f46e5; }
        .lecture-card { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #e5e7eb; cursor: pointer; display: flex; align-items: center; }
        .lecture-card:hover { border: 1px solid #4f46e5; }
        footer { position: fixed; bottom: 0; width: 100%; background: #fff; text-align: center; padding: 10px; font-size: 12px; border-top: 1px solid #e5e7eb; color: #666; }
        #loadingScreen { position: fixed; inset: 0; background: #fff; display: flex; align-items: center; justify-content: center; z-index: 9999; }
    </style>
</head>
<body>

    <div class="header">
        <span>The DevCoderZ</span>
        <span style="font-size: 12px; font-weight: normal;">Lecture Portal</span>
    </div>

    <div id="loadingScreen">Loading...</div>

    <div class="wrapper-fOD1sd">
        <h3 id="topicName" style="margin-bottom: 20px;">Loading Topic...</h3>
        
        <div class="tabs" id="tabsContainer">
            <button class="tab-btn" onclick="switchTab('videos')">Lectures</button>
            <button class="tab-btn" onclick="switchTab('notes')">Notes</button>
            <button class="tab-btn" onclick="switchTab('dppQuiz')">DPP Quiz</button>
            <button class="tab-btn" onclick="switchTab('DppNotes')">DPP PDF</button>
            <button class="tab-btn" onclick="switchTab('DppVideos')">DPP Solutions</button>
        </div>

        <div id="contentContainer"></div>
    </div>

    <footer>Developed by Devansh Sharma</footer>

    <script>
        const params = new URLSearchParams(window.location.search);
        
        function switchTab(tabName) {
            params.set('tab', tabName);
            window.location.search = params.toString();
        }

        async function init() {
            const currentTab = params.get('tab') || 'videos';
            document.querySelectorAll('.tab-btn').forEach(btn => {
                if(btn.innerText.toLowerCase().replace(' ', '') === currentTab.toLowerCase()) btn.classList.add('active');
            });

            const query = params.toString();
            const proxyUrl = `https://devcoderz-player.vercel.app/api/stream.js?${query}`;

            try {
                const response = await fetch(proxyUrl);
                const data = await response.json();
                
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('topicName').innerText = data.topic_name || "Topic";
                
                const container = document.getElementById('contentContainer');
                const list = data.lectures || [];

                if (list.length > 0) {
                    container.innerHTML = list.map(item => `
                        <div class="lecture-card" onclick="window.open('https://www.pw.live/study/batches/lectures/${item.id}', '_blank')">
                            <img src="${item.image}" style="width:80px; height:60px; border-radius:8px; margin-right:15px; object-fit:cover;">
                            <div>
                                <h4 style="margin:0; font-size:14px;">${item.name}</h4>
                                <p style="margin:5px 0 0; color:#666; font-size:12px;">Duration: ${item.duration || 'N/A'}</p>
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = "<h3>No content found in this tab.</h3>";
                }
            } catch (err) {
                document.getElementById('loadingScreen').innerHTML = "Error loading content.";
            }
        }
        init();
    </script>
</body>
</html>
