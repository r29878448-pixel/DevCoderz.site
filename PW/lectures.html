<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">PW Lecture - DevCoderZ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin:0; padding:0; height:100%; background:#000; overflow:hidden; }
        #shell { width:100%; height:100vh; position:relative; }
    </style>
</head>
<body>

<div id="shell"></div>

<input type="hidden" id="data-video-id" value="">
<input type="hidden" id="data-batch-id" value="">
<input type="hidden" id="data-subject-id" value="">
<input type="hidden" id="data-title" value="">

<script src="player.js"></script>

<script>
    const params = new URLSearchParams(window.location.search);
    
    document.getElementById('data-video-id').value = params.get('video_id') || params.get('videoId') || '';
    document.getElementById('data-batch-id').value = params.get('batch_id') || params.get('batchId') || '';
    document.getElementById('data-subject-id').value = params.get('subject_id') || params.get('subjectId') || '';
    document.getElementById('data-title').value = params.get('title') || 'PW Lecture';

    document.getElementById('pageTitle').textContent = params.get('title') || 'PW Lecture';
</script>

</body>
</html>
