<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectures - Rishav Thakur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="player.js" defer></script>
    <style> body { background-color: #f0f9ff; font-family: sans-serif; } </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="bg-sky-500 p-4 text-white shadow-lg">
        <h1 class="text-xl font-bold text-center">Lectures</h1>
    </nav>

    <div id="contentContainer" class="p-4 flex-grow">
        <div class="text-center mt-20 text-sky-600 font-bold">Fetching official data...</div>
    </div>

    <footer class="p-4 text-center text-sky-700 font-semibold text-sm bg-white border-t border-sky-100">
        Developed by Rishav Thakur
    </footer>

    <script>
        const params = new URLSearchParams(window.location.search);
        
        async function loadContent() {
            const container = document.getElementById('contentContainer');
            const bId = params.get("batchId");
            const sId = params.get("subjectId");
            const tag = params.get("tag");

            try {
                // 1. Pehle valid token lo (player.js mein define hai)
                const token = await getValidToken(); 
                
                // 2. Official Penpencil API call
                const u = `https://api.penpencil.co/v2/batches/${bId}/subject/${sId}/contents?tag=${tag}&contentType=videos&page=1`;
                
                const res = await fetch(u, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Client-Type': 'WEB'
                    }
                });
                
                const json = await res.json();

                if (json.data && json.data.length > 0) {
                    container.innerHTML = json.data.map(i => `
                        <div class="bg-white p-4 mb-3 rounded-2xl shadow-md border border-sky-100 flex items-center gap-4 cursor-pointer hover:bg-sky-50" 
                             onclick="window.location.href='player.html?videoId=${i._id}'">
                            ${i.videoDetails?.image ? `<img src="${i.videoDetails.image}" class="w-20 h-16 rounded-xl object-cover shadow-sm">` : ''}
                            <p class="font-bold text-sky-900 text-sm">${i.topic || "Untitled"}</p>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p class="text-center mt-10 text-sky-500">No content found</p>';
                }
            } catch (e) {
                container.innerHTML = '<p class="text-center mt-10 text-red-500">Error loading data.</p>';
            }
        }
        
        // Wait for player.js to load, then trigger
        window.addEventListener('load', loadContent);
    </script>
</body>
</html>
