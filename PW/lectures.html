<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectures</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 pb-16">
    <div id="tabsContainer" class="flex gap-2 p-4 overflow-x-auto bg-white border-b sticky top-0 z-10">
        <button onclick="loadContent('videos', this)" class="tab-btn active px-4 py-2 rounded-full bg-indigo-600 text-white text-sm font-bold">Lectures</button>
        <button onclick="loadContent('notes', this)" class="tab-btn px-4 py-2 rounded-full bg-white border text-sm font-bold">Notes</button>
    </div>

    <div id="contentContainer" class="p-4">
        <div class="text-center mt-10 text-gray-500">Loading...</div>
    </div>

    <script>
        const API_BASE = "https://apiserver.deltastudy.site";
        const ENCRYPTION_KEY = "maggikhalo";

        const params = new URLSearchParams(window.location.search);
        const batchId = params.get("batchId") || params.get("BatchId");
        const subjectSlug = params.get("subjectSlug") || params.get("Subjectslug");
        const topicSlug = params.get("topicSlug") || params.get("topicslug");

        async function loadContent(tab, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('bg-indigo-600', 'text-white');
                b.classList.add('bg-white', 'border');
            });
            if(btn) {
                btn.classList.add('bg-indigo-600', 'text-white');
                btn.classList.remove('bg-white', 'border');
            }

            const container = document.getElementById('contentContainer');
            container.innerHTML = '<div class="text-center mt-10 text-gray-500">Loading content...</div>';

            try {
                const url = `${API_BASE}/api/pw/datacontent?batchId=${batchId}&subjectSlug=${subjectSlug}&topicSlug=${topicSlug}&contentType=${tab}`;
                const res = await fetch(url);
                const json = await res.json();
                
                const decrypted = await decryptPayload(json.data);
                render(decrypted.data || []);
            } catch (e) {
                container.innerHTML = '<div class="text-center mt-10 text-red-500">Error loading data.</div>';
            }
        }

        async function decryptPayload(payload) {
            try {
                if(!payload) return {data: []};
                const [ivHex, encryptedHex] = payload.split(":");
                const iv = new Uint8Array(ivHex.match(/.{1,2}/g).map(x => parseInt(x, 16)));
                const encrypted = new Uint8Array(encryptedHex.match(/.{1,2}/g).map(x => parseInt(x, 16)));
                const key = await importAesKey(ENCRYPTION_KEY);
                const decrypted = await crypto.subtle.decrypt({name: "AES-GCM", iv}, key, encrypted);
                return JSON.parse(new TextDecoder().decode(decrypted));
            } catch(e) { return {data: []}; }
        }

        async function importAesKey(keyText) {
            const encoded = new TextEncoder().encode(keyText);
            const keyBytes = new Uint8Array(32);
            for(let i=0; i<32; i++) keyBytes[i] = i < encoded.length ? encoded[i] : 0;
            return crypto.subtle.importKey("raw", keyBytes, {name: "AES-GCM", length: 256}, false, ["decrypt"]);
        }

        function render(items) {
            const container = document.getElementById('contentContainer');
            if(!items || items.length === 0) {
                container.innerHTML = '<p class="text-center mt-10 text-gray-400">No content found</p>';
                return;
            }
            container.innerHTML = items.map(i => `
                <div class="bg-white p-4 mb-3 rounded-xl shadow-sm border border-gray-100">
                    <p class="font-bold text-gray-800">${i.name || i.topic || "Untitled"}</p>
                    <p class="text-xs text-gray-400 mt-1">${i.duration || ''}</p>
                </div>
            `).join('');
        }

        loadContent('videos', document.querySelector('.tab-btn'));
    </script>
</body>
</html>
