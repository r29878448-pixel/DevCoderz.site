<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectures</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-user-select: none; user-select: none; }
        .tab-btn { padding: 0.6rem 1.2rem; border-radius: 9999px; font-weight: 700; font-size: 0.85rem; transition: all 0.2s; }
        .tab-btn.active { background: #4f46e5; color: white; }
    </style>
</head>
<body class="bg-gray-50 pb-16" oncontextmenu="return false;">
    <nav class="h-16 bg-white border-b flex items-center px-4 sticky top-0 z-20">
        <button onclick="history.back()" class="text-gray-600 font-bold text-sm">← Back</button>
        <h1 class="ml-4 font-bold text-gray-800">Content</h1>
    </nav>
    <div id="tabsContainer" class="flex gap-2 p-4 overflow-x-auto bg-white border-b sticky top-16 z-10">
        <button onclick="loadContent('videos', this)" class="tab-btn active bg-indigo-600 text-white">Lectures</button>
        <button onclick="loadContent('notes', this)" class="tab-btn bg-white border">Notes</button>
        <button onclick="loadContent('DppNotes', this)" class="tab-btn bg-white border">DPP</button>
    </div>
    <div id="contentContainer" class="p-4"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const bId = params.get("batchId") || params.get("batch_id");
        const sId = params.get("subjectId") || params.get("subject_id");
        const tag = params.get("tag") ? `&tag=${params.get("tag")}` : "";

        async function loadContent(tab, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('bg-indigo-600', 'text-white');
                b.classList.add('bg-white', 'border');
            });
            if(btn) {
                btn.classList.add('bg-indigo-600', 'text-white');
                btn.classList.remove('bg-white', 'border');
            }

            const container = document.getElementById('contentContainer');
            container.innerHTML = '<div class="text-center mt-10 text-gray-500">Loading lectures...</div>';

            try {
                const u = `https://devcoderz-pw.vercel.app/api/PW/all-batches-api4.js?batchId=\( {bId}&subjectId= \){sId}&contentType=\( {tab} \){tag}`;
                const res = await fetch(u);
                const json = await res.json();

                if (json.data && json.data.length > 0) {
                    container.innerHTML = json.data.map(i => `
                        <div onclick="playVideo('\( {i._id || (i.videoDetails && i.videoDetails._id) || ''}', ' \){encodeURIComponent(i.topic || (i.videoDetails && i.videoDetails.name) || 'Lecture')}')" 
                             class="bg-white p-4 mb-3 rounded-xl shadow-sm border border-gray-100 flex items-center gap-4 cursor-pointer hover:bg-gray-50">
                            \( {i.videoDetails?.image ? `<img src=" \){i.videoDetails.image}" class="w-16 h-12 rounded-lg object-cover">` : ''}
                            <div class="flex-1">
                                <p class="font-bold text-gray-800">${i.topic || (i.videoDetails && i.videoDetails.name) || "Untitled"}</p>
                            </div>
                            <div class="text-indigo-500 text-2xl">▶</div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p class="text-center mt-10 text-gray-400">No lectures found</p>';
                }
            } catch (e) {
                container.innerHTML = '<div class="text-center mt-10 text-red-500">Error loading data. Check console.</div>';
                console.error(e);
            }
        }

        function playVideo(videoId, title) {
            if (!videoId) {
                alert("Video ID not found!");
                return;
            }
            const url = `./play.html?batch_id=\( {bId}&subject_id= \){sId}&video_id=\( {videoId}&title= \){title}`;
            window.location.href = url;
        }

        // Auto load lectures
        loadContent('videos', document.querySelector('.tab-btn'));
    </script>
</body>
</html>
