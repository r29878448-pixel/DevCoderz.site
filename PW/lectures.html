<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The DevCoderZ | Lectures</title>
    <link href="https://www.pw.live/batches-new/index.BZrLlnYz.css" rel="stylesheet" type="text/css">
    <style>
        body { background: #f9fafb; font-family: sans-serif; margin: 0; padding-bottom: 60px; }
        .header { background: #4f46e5; color: white; padding: 15px 20px; font-weight: bold; }
        .wrapper { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        .lecture-card { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #e5e7eb; cursor: pointer; display: flex; align-items: center; }
        .lecture-card:hover { border: 1px solid #4f46e5; }
    </style>
</head>
<body>

    <div class="header">The DevCoderZ</div>
    <div class="wrapper">
        <h3 id="topicName">Loading...</h3>
        <div id="contentContainer"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        async function init() {
            const query = params.toString();
            const response = await fetch(`https://devcoderz-player.vercel.app/api/stream.js?${query}`);
            const data = await response.json();
            document.getElementById('topicName').innerText = data.topic_name || "Topic";
            
            const list = data.lectures || data.notes || data.dpp || data.dppNotes || [];
            document.getElementById('contentContainer').innerHTML = list.map(item => `
                <div class="lecture-card" onclick="window.location.href='/player.html?video_id=${item.id}&batch_id=${item.batch_id}&subject_id=${item.subject_id}&name=${encodeURIComponent(item.name || 'Content')}'">
                    <img src="${item.image || 'https://static.pw.live/react-batches/assets/study/notes-icon.svg'}" style="width:80px; height:60px; border-radius:8px; margin-right:15px;">
                    <div>
                        <h4 style="margin:0; font-size:14px;">${item.name || item.title || "Content"}</h4>
                    </div>
                </div>
            `).join('');
        }
        init();
    </script>
</body>
</html>
