<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0">
  <title>Video Downloader</title>
  <link rel="stylesheet" href="/html-js/next-static.css">
  <script defer src="./download.js"></script>
  <style>
    :root { --bg: #F5F2EB; --ink: #1A1814; --accent: #D4540E; --border: rgba(26,24,20,.1); }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }
    .download-shell { max-width: 720px; margin: 0 auto; padding: 24px 16px; }
    .panel { background: #FFFDFB; border: 1px solid var(--border); border-radius: 14px; padding: 24px; }
    .input-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .input-group input { height: 44px; padding: 0 14px; border: 1px solid var(--border); border-radius: 10px; transition: 0.3s; }
    .input-group input:not(:focus) { filter: blur(4px); }
    .btn { height: 44px; padding: 10px 18px; border-radius: 10px; cursor: pointer; border: none; background: var(--ink); color: #fff; width: 100%; font-weight: 600; }
    .progress-track { width: 100%; height: 8px; background: #ECEAE2; border-radius: 999px; overflow: hidden; margin-bottom: 8px; }
    #progressBar { display: block; height: 100%; width: 0%; background: var(--accent); transition: width .3s; }
    .log-panel { background: var(--bg); padding: 14px; border-radius: 10px; max-height: 200px; overflow-y: auto; font-family: monospace; font-size: 12px; }
  </style>
</head>
<body>
  <div class="download-shell">
    <section class="panel">
      <div class="input-group">
        <span>Master URL</span>
        <input id="masterUrl" type="url">
      </div>
      <div class="input-group">
        <span>URL Prefix</span>
        <input id="urlPrefix" type="text">
      </div>
      <div class="input-group">
        <span>Encryption Key</span>
        <input id="keyInput" type="text" maxlength="32">
      </div>
      <button class="btn" id="fetchPlaylist">Fetch Playlist</button>
      <button class="btn" id="loadSegments" hidden>Load Segments</button>
      <button class="btn" id="downloadMp4" hidden>Download MP4</button>
      <div class="progress-wrap">
        <div class="progress-track"><span id="progressBar"></span></div>
        <p id="statusText">Ready</p>
      </div>
      <div class="log-panel" id="logList">--- Log ---</div>
    </section>
  </div>
  <script>
    (function() {
      document.addEventListener('contextmenu', e => e.preventDefault(), true);
      ['selectstart','dragstart','copy','cut'].forEach(ev => {
        document.addEventListener(ev, e => e.preventDefault());
      });
      document.addEventListener('keydown', e => {
        if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key))) {
          e.preventDefault(); return false;
        }
      }, true);
    })();
  </script>
</body>
</html>
