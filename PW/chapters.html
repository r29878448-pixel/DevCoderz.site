<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapters - DevCoderZ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
      body { background: #f8fafc; color: #0f172a; }
      .glow-text { text-shadow: 0 0 8px rgba(79, 70, 229, 0.2); }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-16">

    <nav class="h-16 bg-[#4f46e5] flex items-center justify-between px-6 shadow-md sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <button id="backBtn" class="bg-white/20 hover:bg-white/30 text-white text-xs font-bold py-2 px-4 rounded-lg transition-all">
                ← Back
            </button>
            <div class="hidden sm:flex items-center gap-2">
                <span class="text-xl font-black tracking-tight text-white">The DevCoderZ</span>
            </div>
        </div>
        <div class="text-xs text-white/90 bg-white/10 px-3 py-1.5 rounded-full border border-white/20 font-medium">
            Chapter Vault Active
        </div>
    </nav>

    <main class="flex-1 max-w-5xl w-full mx-auto p-4 md:p-6">
        <div class="mb-6">
            <h2 id="pageTitle" class="text-xl font-extrabold text-slate-800 tracking-tight">Select Chapter</h2>
            <p id="statusText" class="text-xs text-slate-400">Loading chapters...</p>
        </div>

        <div id="chaptersContainer" class="space-y-3">
            <div class="bg-white p-5 border border-slate-200 rounded-2xl animate-pulse h-16 shadow-sm"></div>
            <div class="bg-white p-5 border border-slate-200 rounded-2xl animate-pulse h-16 shadow-sm"></div>
        </div>
    </main>

    <footer class="h-12 border-t border-slate-200 bg-white text-center text-xs text-slate-500 flex items-center justify-center gap-1 fixed bottom-0 inset-x-0 z-50 shadow-inner">
        <span>© 2026 The DevCoderz.</span>
    </footer>

    <script>
        const params = new URLSearchParams(window.location.search);
        const bId = params.get('batch_id');
        const sId = params.get('subject_id');

        if (!bId || !sId) {
            window.location.href = "./index.html";
        }

        document.getElementById('backBtn').onclick = () => {
            window.history.back();
        };

        async function loadChapters() {
            const container = document.getElementById('chaptersContainer');
            const statusText = document.getElementById('statusText');
            const pageTitle = document.getElementById('pageTitle');

            const targetApi = `/api/PW/all-batches-api3?batch_id=${encodeURIComponent(bId)}&subject_id=${encodeURIComponent(sId)}`;

            try {
                statusText.innerText = "Connecting...";
                const res = await fetch(targetApi);
                const resData = await res.json();
                let chapters = resData.topics || resData.chapters || resData.data?.topics || [];

                if (resData.subject_name) pageTitle.innerText = resData.subject_name;

                if (chapters.length === 0) {
                    container.innerHTML = `<div class="text-center text-slate-400 py-12 text-sm">No chapters found.</div>`;
                    return;
                }

                statusText.innerText = "Chapters Decrypted Successfully.";
                container.innerHTML = chapters.map(c => {
                    const name = c.topicName || c.chapterName || c.name || "Chapter";
                    const id = c.topicId || c.chapterId || c._id || c.id;
                    const slug = c.slug || ""; 

                    return `
                    <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm hover:shadow-md transition-all cursor-pointer flex items-center justify-between group" onclick="openLectures('${id}', '${slug}')">
                        <div class="flex items-center gap-3 truncate">
                            <div class="w-8 h-8 rounded-xl bg-indigo-50 text-[#4f46e5] flex items-center justify-center font-bold text-xs group-hover:bg-[#4f46e5] group-hover:text-white transition-all">📁</div>
                            <span class="text-sm font-bold text-slate-700 truncate">${name}</span>
                        </div>
                        <div class="text-indigo-500 font-bold">→</div>
                    </div>
                    `;
                }).join('');

            } catch (e) {
                container.innerHTML = `<div class="text-center text-red-500 py-12 text-sm">Error connecting to server.</div>`;
            }
        }

        function openLectures(id, slug) {
            const finalId = (slug && slug !== "undefined") ? slug : id;
            window.location.href = `./lectures.html?batch_id=${bId}&subject_id=${sId}&topic_id=${finalId}`;
        }

        if (bId && sId) loadChapters();
    </script>
</body>
</html>
